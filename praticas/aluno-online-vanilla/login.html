<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/javascript.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login</title>
        <link rel="stylesheet" href="/src/style.css">
    </head>
<body>
    <main class="mainL">
        <article class="cardL">
            <header class="headerL">
                <img src="/learn.svg" alt= "Icon Hat" class="logo-login">
                <h1 class="h1L">Aluno Online</h1>
            </header>
            <form class="login">
                <label for="email">E-mail</label>
                <input class="input" type="string" id="email" name="email"/>
                <p class="erro" id="erroEmail"></p>
                <label for="senha">Senha</label>
                <input class="input" type="password" id="senha" name="senha"/>
                <p class="erro" id="erroSenha"></p>
                <button class="input" type="submit">Entrar</button>
            </form>
        </article>
        <h2 class="h2L">© 2026. Todos os direitos reservados.</h2>
    </main>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
